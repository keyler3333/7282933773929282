name: SERIX CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  XCODE_VERSION: '15.4'
  SCHEME: 'SERIX'
  BUNDLE_ID: 'com.serix.app'

permissions:
  contents: write
  pull-requests: write

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict

  test:
    name: Test
    runs-on: macos-14
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project SERIX.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Run tests
        run: |
          xcodebuild test-without-building \
            -project SERIX.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult

  analyze:
    name: Static Analysis
    runs-on: macos-14
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Build with analyzer
        run: |
          xcodebuild build \
            -project SERIX.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -skipPackagePluginValidation \
            analyze \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  security_scan:
    name: Security Scan
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keychain usage verification
        run: |
          echo "Verifying Keychain implementation..."
          grep -r "kSecClass" SERIX/ --include="*.swift" || echo "No Keychain class references found"
          grep -r "SecItemAdd\|SecItemCopyMatching\|SecItemDelete" SERIX/ --include="*.swift" || echo "No SecItem function calls found"

      - name: Check for hardcoded keys
        run: |
          echo "Scanning for hardcoded API keys..."
          HARDCODED=$(grep -rn "gsk_[a-zA-Z0-9]\{40,\}" SERIX/ --include="*.swift" --include="*.plist" --include="*.json" || true)
          if [ -n "$HARDCODED" ]; then
            echo "ERROR: Hardcoded API keys found:"
            echo "$HARDCODED"
            exit 1
          fi
          echo "No hardcoded keys found"

      - name: Check transport security
        run: |
          if grep -q "NSAllowsArbitraryLoads.*true" SERIX/Info.plist 2>/dev/null; then
            echo "WARNING: ATS completely disabled"
          fi

      - name: Run dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  build_ipa:
    name: Build IPA
    runs-on: macos-14
    needs: [test, analyze, security_scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Archive
        run: |
          xcodebuild archive \
            -project SERIX.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -archivePath ./build/SERIX.xcarchive \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/SERIX.xcarchive \
            -exportOptionsPlist ./ExportOptions.plist \
            -exportPath ./build/ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SERIX.ipa
          path: ./build/ipa/SERIX.ipa

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build_ipa
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## SERIX Build ${{ github.run_number }}

            ### Commit
            ${{ github.sha }} on ${{ github.ref_name }}

            ### IPA
            Available in workflow artifacts.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: SERIX CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  XCODE_VERSION: '15.4'
  SCHEME: 'SERIX'
  PROJECT: 'SERIX.xcodeproj'
  BUNDLE_ID: 'com.serix.app'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          cd SERIX
          swiftlint --strict

  test:
    name: Test
    runs-on: macos-14
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Run tests
        run: |
          xcodebuild test-without-building \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult

  analyze:
    name: Static Analysis
    runs-on: macos-14
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Build with analyzer
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -skipPackagePluginValidation \
            analyze \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  security_scan:
    name: Security Scan
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keychain usage verification
        run: |
          echo "Verifying Keychain implementation..."
          grep -r "kSecClass" SERIX/ --include="*.swift" || echo "No Keychain usage found"
          grep -r "SecItemAdd\|SecItemCopyMatching\|SecItemDelete" SERIX/ --include="*.swift"

      - name: Check for hardcoded keys
        run: |
          echo "Scanning for hardcoded API keys in source files..."
          HARDCODED_KEYS=$(grep -rn "gsk_[a-zA-Z0-9]\{40,\}" SERIX/ --include="*.swift" --include="*.plist" --include="*.json" || true)
          if [ -n "$HARDCODED_KEYS" ]; then
            echo "ERROR: Found hardcoded API keys:"
            echo "$HARDCODED_KEYS"
            echo ""
            echo "These should be removed. Users must enter their own keys via Settings."
            exit 1
          fi
          echo "No hardcoded API keys found. Good!"

      - name: Check transport security
        run: |
          echo "Verifying App Transport Security..."
          if grep -q "NSAllowsArbitraryLoads.*true" SERIX/Info.plist 2>/dev/null; then
            echo "WARNING: ATS disabled. Ensure this is intentional."
          fi

      - name: Run dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  build_ipa:
    name: Build IPA
    runs-on: macos-14
    needs: [test, analyze, security_scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Decode certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          if [ -n "$BUILD_CERTIFICATE_BASE64" ]; then
            echo $BUILD_CERTIFICATE_BASE64 | base64 --decode > certificate.p12
            security create-keychain -p "" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "" build.keychain
            security import certificate.p12 -k build.keychain -P $P12_PASSWORD -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          fi

      - name: Decode provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -n "$PROVISIONING_PROFILE_BASE64" ]; then
            echo $PROVISIONING_PROFILE_BASE64 | base64 --decode > profile.mobileprovision
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          fi

      - name: Archive
        env:
          CODE_SIGN_STYLE: ${{ secrets.CODE_SIGN_IDENTITY && 'Manual' || 'Automatic' }}
        run: |
          xcodebuild archive \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -archivePath ./build/SERIX.xcarchive \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            CODE_SIGN_STYLE=$CODE_SIGN_STYLE \
            PROVISIONING_PROFILE_SPECIFIER=${{ secrets.PROVISIONING_PROFILE_SPECIFIER }} \
            CODE_SIGN_IDENTITY=${{ secrets.CODE_SIGN_IDENTITY }}

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/SERIX.xcarchive \
            -exportOptionsPlist ./ExportOptions.plist \
            -exportPath ./build/ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SERIX.ipa
          path: ./build/ipa/SERIX.ipa

      - name: Upload to App Store Connect
        if: env.APPSTORE_KEY_ID != ''
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: './build/ipa/SERIX.ipa'
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build_ipa
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## SERIX Build ${{ github.run_number }}
            
            ### Changes
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            
            ### Download
            The IPA is available in the build artifacts.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build_ipa, release]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Determine status
        run: |
          if [ "${{ needs.build_ipa.result }}" == "success" ] || [ "${{ needs.build_ipa.result }}" == "skipped" ]; then
            echo "BUILD_STATUS=✅ Success" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=❌ Failed" >> $GITHUB_ENV
          fi

      - name: Log status
        run: |
          echo "Build Number: ${{ github.run_number }}"
          echo "Status: $BUILD_STATUS"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

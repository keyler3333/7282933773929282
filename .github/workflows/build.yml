name: SERIX CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  XCODE_VERSION: '15.4'
  SCHEME: 'SERIX'

permissions:
  contents: read

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict

  build:
    name: Build & Package
    runs-on: macos-14
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Fix Xcode project format
        run: sed -i '' 's/objectVersion = [0-9]*;/objectVersion = 60;/' SERIX.xcodeproj/project.pbxproj

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project SERIX.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -derivedDataPath ./DerivedData \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Package App
        run: |
          APP_PATH=$(find ./DerivedData/Build/Products -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          zip -r SERIX-simulator.zip "$APP_PATH"

      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SERIX-simulator
          path: SERIX-simulator.zip

  analyze:
    name: Static Analysis
    runs-on: macos-14
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Fix Xcode project format
        run: sed -i '' 's/objectVersion = [0-9]*;/objectVersion = 60;/' SERIX.xcodeproj/project.pbxproj

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Build with Analyzer
        run: |
          xcodebuild build \
            -project SERIX.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -skipPackagePluginValidation \
            analyze \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  security_scan:
    name: Security Scan
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keychain usage verification
        run: |
          echo "Verifying Keychain implementation..."
          grep -r "kSecClass" SERIX/ --include="*.swift" || echo "No Keychain class references found"
          grep -r "SecItemAdd\|SecItemCopyMatching\|SecItemDelete" SERIX/ --include="*.swift" || echo "No SecItem function calls found"

      - name: Check for hardcoded keys
        run: |
          echo "Scanning for hardcoded API keys..."
          HARDCODED=$(grep -rn "gsk_[a-zA-Z0-9]\{40,\}" SERIX/ --include="*.swift" --include="*.plist" --include="*.json" || true)
          if [ -n "$HARDCODED" ]; then
            echo "ERROR: Hardcoded API keys found:"
            echo "$HARDCODED"
            exit 1
          fi
          echo "No hardcoded keys found"

      - name: Check transport security
        run: |
          if grep -q "NSAllowsArbitraryLoads.*true" SERIX/Info.plist 2>/dev/null; then
            echo "WARNING: ATS completely disabled"
          fi

      - name: Run dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
